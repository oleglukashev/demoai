services:
  qdrant:
    image: qdrant/qdrant:v1.15.1
    container_name: demoai-qdrant
    ports:
      - '6333:6333' # REST API + web UI at http://localhost:6333/dashboard
      - '6334:6334' # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

volumes:
  qdrant_storage:
